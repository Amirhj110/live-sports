name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Build with Next.js
        env:
          NEXT_PUBLIC_CRICKET_API_KEY: ${{ secrets.NEXT_PUBLIC_CRICKET_API_KEY }}
          NEXT_PUBLIC_FOOTBALL_API_KEY: ${{ secrets.NEXT_PUBLIC_FOOTBALL_API_KEY }}
          NEXT_PUBLIC_GNEWSPAI_KEY: ${{ secrets.NEXT_PUBLIC_GNEWSPAI_KEY }}
        run: npx next build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
